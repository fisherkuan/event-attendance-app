<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donations — Lilai</title>
    <meta name="description" content="View donation balance and recent entries for the Lilai app.">
    <link rel="stylesheet" href="/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet">
    <link rel="icon" href="/icons/favicon.ico" type="image/x-icon">
    <script src="https://js.stripe.com/v3/"></script>
</head>
<body>
<div class="container container-narrow">
    <a class="faq-back" href="/">← Back to events</a>

    <section class="donations-hero">
        <div class="eyebrow">Balance</div>
        <span id="balance-amount" class="balance-amount">€0.00</span>

        <div class="balance-bar-wrap" id="donation-progress-wrap">
            <div class="balance-bar-track">
                <span class="balance-bar-zero" aria-hidden="true"></span>
                <span id="donation-progress-fill" class="balance-bar-fill"></span>
            </div>
            <div class="balance-bar-meta">
                <span id="balance-bar-min"></span>
                <span>€0</span>
                <span id="balance-bar-max"></span>
            </div>
        </div>

        <div class="donation-cta-row">
            <button type="button" id="donate-btn" class="btn accent">Donate with Stripe</button>
        </div>
        <p style="color: var(--text-muted); font-size: 13px; max-width: 440px; margin: var(--s-3) auto 0;">
            Hosting this web app costs money — your support keeps it running. All donations go directly to operating expenses.
        </p>
    </section>

    <hr class="divider" />

    <section class="donations-section">
        <div class="section-header">
            <div>
                <h2 class="section-title">Transactions</h2>
                <div class="section-meta">Most recent entries</div>
            </div>
            <button type="button" id="refresh-donations-btn" class="btn ghost sm" title="Refresh entries">↻ Refresh</button>
        </div>
        <div id="donations-list" class="donations-list">
            <div class="loading">Loading entries...</div>
        </div>
    </section>

    <footer class="bottom-banner">
        <div class="banner-content">
            <p class="copyright">&copy; Built by Fisher Kuan</p>
        </div>
    </footer>
</div>

<script src="/js/donation.js"></script>
</body>
</html>
