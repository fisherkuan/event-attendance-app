<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Events</title>
    <link rel="stylesheet" href="/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet">
    <link rel="icon" href="/icons/favicon.ico" type="image/x-icon">
</head>
<body>
<div class="container container-narrow">
    <header class="admin-header">
        <div>
            <div class="eyebrow">Admin</div>
            <h1>Event &amp; donation management</h1>
            <p>Set attendance limits for upcoming events.</p>
        </div>
        <nav class="tabs" aria-label="Admin sections">
            <a href="/admin" class="active">Events</a>
            <a href="/admin-donations">Donations</a>
            <a href="/">Back to site</a>
        </nav>
    </header>

    <main>
        <section class="events-section">
            <div class="section-header">
                <div>
                    <h2 class="section-title">Future events</h2>
                    <div class="section-meta">Set attendance limits</div>
                </div>
            </div>
            <div id="admin-events-list">
                <div class="loading">Loading events...</div>
            </div>
        </section>
    </main>

    <footer class="bottom-banner">
        <div class="banner-content">
            <p class="copyright">&copy; Built by Fisher Kuan</p>
        </div>
    </footer>
</div>

<script src="/admin.js"></script>
</body>
</html>
